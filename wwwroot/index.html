<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻雀集計ツール</title>
    
    <script>
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            document.write('<base href="/" />');
        } else {
            document.write('<base href="/MahjongApp/" />');
        }
    </script>
    
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MahjongApp.styles.css" rel="stylesheet" />
    
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+Antique:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <meta name="theme-color" content="#1b5e20" />

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <style>
            .mahjong-loading-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #0d140d; /* アプリ背景と同じ深い緑 */
                color: #e0e0e0;
                font-family: 'Kaisei Decol', serif;
            }
            .loading-tile {
                font-size: 4rem;
                /* 牌がフワフワと浮き沈みするアニメーション */
                animation: float 2s ease-in-out infinite;
            }
            .loading-text {
                margin-top: 20px;
                font-size: 1.2rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                /* 文字がゆっくり点滅するアニメーション */
                animation: pulse 1.5s ease-in-out infinite;
            }
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-15px); }
                100% { transform: translateY(0px); }
            }
            @keyframes pulse {
                0% { opacity: 0.5; }
                50% { opacity: 1; }
                100% { opacity: 0.5; }
            }
        </style>
        
        <div class="mahjong-loading-container">
            <div class="loading-tile">🀄</div>
            <div class="loading-text">雀卓準備中...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>

</html>
