<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻雀集計ツール</title>

    <base href="/" />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MahjongApp.styles.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+Antique:wght@400;700&display=swap" rel="stylesheet">

    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <meta name="theme-color" content="#1b5e20" />

    <script type="importmap"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<script>
    // 画像シェア機能
    window.exportAndShareResult = async (elementId) => {
        const element = document.getElementById(elementId);
        if (!element) return "ERROR: Element not found";
        try {
            const canvas = await html2canvas(element, {
                backgroundColor: "#1a1a27",
                scale: 2,
                logging: false
            });
            return new Promise((resolve) => {
                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        resolve("ERROR: Blob creation failed");
                        return;
                    }
                    const file = new File([blob], 'mahjong_result.png', { type: 'image/png' });
                    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                    // 2. 【スマホ向け】モバイル端末 ＆ Web Share APIが使える場合
                    if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: '麻雀対局結果'
                        }).catch(e => console.log("Share aborted", e));
                        resolve("SHARED");
                        return;
                    }
                    // 3. 【PC向け】クリップボードに画像を直接コピー
                    try {
                        if (navigator.clipboard && window.ClipboardItem) {
                            await navigator.clipboard.write([
                                new ClipboardItem({ [file.type]: blob })
                            ]);
                            resolve("COPIED");
                            return;
                        }
                    } catch (e) {
                        console.log("Clipboard error fallback", e);
                    }
                    // 4. 【最終手段】未対応ブラウザの場合はダウンロード
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'mahjong_result.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    resolve("DOWNLOADED");
                }, 'image/png');
            });
        } catch (error) {
            return "ERROR: " + error.message;
        }
    };

    // URLシェア機能
    window.shareUrlNative = async (title, url) => {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        // 1. 【スマホ向け】モバイル端末 ＆ Web Share APIが使える場合
        if (isMobile && navigator.share) {
            navigator.share({
                title: title,
                url: url
            }).catch(err => console.log("Share aborted", err));
            return "SHARED";
        } else {
            // 2. 【PC向け】クリップボードにURLを直接コピー
            try {
                if (navigator.clipboard) {
                    await navigator.clipboard.writeText(url);
                    return "COPIED";
                } else {
                    return "ERROR: Clipboard API not available";
                }
            } catch (err) {
                return "ERROR: " + err.message;
            }
        }
    };
</script>

<body>
    <div id="app">
        <style>
            .mahjong-loading-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #0d140d;
                /* アプリ背景と同じ深い緑 */
                color: #e0e0e0;
                font-family: 'Kaisei Decol', serif;
            }

            .loading-tile {
                font-size: 4rem;
                animation: float 2s ease-in-out infinite;
            }

            .loading-text {
                margin-top: 20px;
                font-size: 1.2rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                animation: pulse 1.5s ease-in-out infinite;
            }

            @keyframes float {
                0% {
                    transform: translateY(0px);
                }

                50% {
                    transform: translateY(-15px);
                }

                100% {
                    transform: translateY(0px);
                }
            }

            @keyframes pulse {
                0% {
                    opacity: 0.5;
                }

                50% {
                    opacity: 1;
                }

                100% {
                    opacity: 0.5;
                }
            }
        </style>

        <div class="mahjong-loading-container">
            <div class="loading-tile">🀄</div>
            <div class="loading-text">雀卓準備中...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').then(registration => {
                registration.onupdatefound = () => {
                    const installingWorker = registration.installing;
                    if (installingWorker == null) {
                        return;
                    }
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm("アプリの新しいバージョンがあります。更新して再読み込みしますか？\n（現在の入力状態は保存されます）")) {
                                installingWorker.postMessage('SKIP_WAITING');
                            }
                        }
                    };
                };
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>

</html>
